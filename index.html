<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#e7e3dd">
<title>Japan — A Field Journal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="brand-bar">
  <span class="brand-mark" id="brand-mark">Field Journal</span>
  <span class="brand-dot" aria-hidden="true"></span>
</header>

<section class="masthead">
  <h1 class="title">Japan</h1>
  <p class="subtitle"><em>A field journal of one trip, with shopping waits.</em></p>
</section>

<section class="map-section" aria-label="Map of Japan">
  <svg id="jp-map" viewBox="0 0 200 320" role="img" aria-label="Japan, with visited cities">
    <g class="land">
      <path d="M 120 30 C 142 22 168 33 170 55 C 170 75 148 82 130 76 C 112 70 104 45 120 30 Z"/>
      <path d="M 92 102 C 88 118 96 134 110 144 L 142 162 C 156 170 170 178 180 184 C 192 192 195 207 184 213 C 170 220 154 222 138 218 C 122 213 108 198 100 178 C 92 158 86 138 88 118 C 88 110 88 105 92 102 Z"/>
      <path d="M 130 235 C 146 230 156 240 152 252 C 146 262 130 260 124 250 C 120 242 122 237 130 235 Z"/>
      <path d="M 72 248 C 90 240 105 254 104 274 C 102 292 84 297 70 290 C 56 280 56 256 72 248 Z"/>
    </g>
    <g class="route" id="map-route"></g>
    <g class="cities" id="map-cities"></g>
  </svg>
  <p class="map-note">Tap a city to filter</p>
</section>

<section class="section ledger-section" aria-label="Shopping ledger">
  <h2 class="section-head">Ledger</h2>
  <div class="ledger">
    <div class="stat"><span class="num" id="stat-min">—</span><span class="lbl">Min&nbsp;spent</span></div>
    <div class="stat"><span class="num" id="stat-eyed">—</span><span class="lbl">Eyed</span></div>
    <div class="stat"><span class="num" id="stat-bought">—</span><span class="lbl">Bought</span></div>
  </div>
</section>

<section class="section coveted" aria-label="Coveted objects">
  <h2 class="section-head">Coveted</h2>
  <p class="section-intro">Objects we tracked across the country &mdash; some watched, some hunted, some carried home.</p>
  <div id="coveted-grid" class="coveted-grid"></div>
</section>

<section class="section field-notes" aria-label="Field notes">
  <h2 class="section-head">Field Notes</h2>
  <nav class="chips" aria-label="Filter">
    <button class="chip is-on" data-filter="all">All</button>
    <button class="chip" data-filter="tokyo">Tokyo</button>
    <button class="chip" data-filter="kyoto">Kyoto</button>
    <button class="chip" data-filter="osaka">Osaka</button>
    <button class="chip" data-filter="shop">Wife's shops</button>
  </nav>
  <main id="feed" class="feed"></main>
</section>

<footer class="colophon">
  <p>Built mobile-first &mdash; a personal journal.</p>
  <p id="trip-dates">May 2026</p>
</footer>

<div id="lightbox" class="lightbox" hidden>
  <button class="lb-close" aria-label="Close">&times;</button>
  <figure class="lb-figure">
    <div class="lb-imgwrap"><img id="lb-img" alt=""></div>
    <figcaption id="lb-cap"></figcaption>
  </figure>
  <button class="lb-prev" aria-label="Previous">&larr;</button>
  <button class="lb-next" aria-label="Next">&rarr;</button>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
