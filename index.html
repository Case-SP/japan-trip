<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#e7e3dd">
<title>Japan — A Field Journal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="brand-bar">
  <span class="brand-mark">Field Journal</span>
  <div class="brand-ledger" aria-label="Ledger: minutes waiting, items eyed, items bought" title="Minutes · Eyed · Bought">
    <span id="stat-min">0</span>
    <span class="brand-sep">·</span>
    <span id="stat-eyed">0</span>
    <span class="brand-sep">·</span>
    <span id="stat-bought">0</span>
  </div>
  <button class="brand-dot" id="map-trigger" aria-label="Open map" aria-controls="map-sheet" aria-expanded="false"></button>
</header>

<section class="section coveted" aria-label="Coveted objects">
  <h2 class="section-head">Coveted</h2>
  <p class="section-intro">Objects we tracked across the country &mdash; some watched, some hunted, some carried home.</p>
  <div id="coveted-grid" class="coveted-grid"></div>
</section>

<section class="section field-notes" aria-label="Field notes">
  <h2 class="section-head">Field Notes</h2>
  <nav class="chips" aria-label="Filter">
    <button class="chip is-on" data-filter="all">All</button>
    <button class="chip" data-filter="tokyo">Tokyo</button>
    <button class="chip" data-filter="kyoto">Kyoto</button>
    <button class="chip" data-filter="osaka">Osaka</button>
    <button class="chip" data-filter="shop">Wife's shops</button>
  </nav>
  <main id="feed" class="feed"></main>
</section>

<div id="map-backdrop" class="map-backdrop" hidden></div>
<aside id="map-sheet" class="map-sheet" aria-hidden="true" aria-label="Trip map">
  <div class="map-sheet-head">
    <span class="map-handle" aria-hidden="true"></span>
    <div class="map-sheet-title">Route</div>
    <button class="map-close" id="map-close" aria-label="Close map">&times;</button>
  </div>
  <div id="leaflet-map" class="leaflet-map"></div>
</aside>

<div id="lightbox" class="lightbox" hidden>
  <button class="lb-close" aria-label="Close">&times;</button>
  <figure class="lb-figure">
    <div class="lb-imgwrap"><img id="lb-img" alt=""></div>
    <figcaption id="lb-cap"></figcaption>
  </figure>
  <button class="lb-prev" aria-label="Previous">&larr;</button>
  <button class="lb-next" aria-label="Next">&rarr;</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
